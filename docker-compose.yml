services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: shein_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp"]
      interval: 5s
      timeout: 5s
      retries: 10
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://erp:erp@db:5432/shein_erp?schema=public
      AUTH_SECRET: change-me-in-production
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: change-me-on-first-login
      ADMIN_NAME: 超级管理员
    depends_on:
      db:
        condition: service_healthy
volumes:
  postgres_data:
